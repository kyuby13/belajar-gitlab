stages:
  - build
  - deploy

variables:
  IMAGE_NAME: registry.gitlab.com/project7112620/belajar-gitlab/nginx-app

build:
  image: docker:latest

  tags:
    - main-runner

  stage: build

  services:
    - docker:dind

  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker build -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:latest

deploy:
  image: alpine:latest

  tags:
    - main-runner

  stage: deploy

  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/

  variables:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  script:
    - kubectl apply -f deployment.yaml
   stages:
  - build
  - deploy

variables:
  IMAGE_NAME: registry.gitlab.com/project7112620/belajar-gitlab/nginx-app

build:
  image: docker:latest

  tags:
    - main-runner

  stage: build

  services:
    - docker:dind

  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com
    - docker build -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:latest

deploy:
  image: alpine:latest

  tags:
    - main-runner

  stage: deploy

  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/

  variables:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  script:
    - kubectl apply -f deployment.yaml
    - kubectl apply -f service.yaml
    - kubectl rollout restart deployment nginx-app
